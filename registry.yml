name: "Default Registry"
description: "Main Ninja registry"
shurikens:
  - type: shuriken
    name: "Caddy"
    version: "2.4.57"
    description: "The Caddy HTTP Server and reverse proxy and everything else."
    author: "me"
    license: ""
    platforms: ["linux", "windows", "macos"]
    url: "https://example.com/apache-{{ os }}.shuriken"

  - type: shuriken
    name: "MySQL"
    version: "2.4.57"
    description: "rlly old Database server"
    author: "me"
    license: ""
    platforms: ["linux", "windows", "macos"]
    url: "https://example.com/mysql-{{ os }}.shuriken"

  - type: shuriken
    name: "PHP"
    version: "2.4.57"
    description: "the PHP interpreter for web dev."
    author: "me"
    license: ""
    platforms: ["linux", "windows", "macos"]
    url: "https://example.com/php-{{ os }}.shuriken"
    
  - type: shuriken
    name: "PostgreSQL"
    version: "2.4.57"
    description: "Database server but better"
    author: "me"
    license: ""
    platforms: ["linux", "windows", "macos"]
    url: "https://example.com/postgres-{{ os }}.shuriken"

  - type: bundle
    name: "AMP Stack"
    version: "1.0.0"
    description: "Apache (now Caddy because apache gave me a lobotomy trying to work with it.), MariaDB, PHP bundle"
    author: "me"
    license: ""
    shurikens: ["Caddy", "MariaDB", "PHP"]

  - type: bundle
    name: "APP Stack"
    version: "1.0.0"
    description: "Apache (now Caddy because apache gave me a lobotomy trying to work with it.), MariaDB, PHP bundle"
    author: "me"
    license: ""
    shurikens: ["Caddy", "PostgreSQL", "PHP"]
